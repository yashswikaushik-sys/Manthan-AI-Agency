<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zapier MCP</title>
  <script src="https://mcp.zapier.com/embed/v1/mcp.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .embed-wrapper {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    #mcp-status {
      font-size: 0.8rem;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <h1>Zapier MCP</h1>

  <div class="embed-wrapper">
    <!--
      TODO: Replace the sign-up-* values below with your user's real data.
      All three fields are required to enable Quick Account Creation (bypasses Zapier sign-up).
      Remove the sign-up-* attributes entirely to use the standard Zapier sign-up flow.
    -->
    <zapier-mcp
      embed-id="6250491a-127a-4908-844f-50c8e2db7092"
      width="100%"
      height="600px"
      sign-up-email="user@example.com"
      sign-up-first-name="First"
      sign-up-last-name="Last"
    ></zapier-mcp>
  </div>

  <p id="mcp-status"></p>

  <script>
    const embed = document.querySelector('zapier-mcp');
    const status = document.getElementById('mcp-status');

    embed.addEventListener('mcp-server-url', (event) => {
      const url = event.detail.serverUrl;
      console.log('MCP Server URL:', url);
      status.textContent = 'MCP server ready.';
    });

    embed.addEventListener('tools-changed', () => {
      console.log('Tools changed — call tools/list on your MCP client to refresh.');
    });

    embed.addEventListener('close-requested', () => {
      console.log('Close requested.');
      document.querySelector('.embed-wrapper').style.display = 'none';
    });
  </script>

</body>
</html>
